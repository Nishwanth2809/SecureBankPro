# ── Railway Deployment Configuration ─────────────────────────────────────────
# Railway auto-detects this file and uses it to configure the deployment.
# Docs: https://docs.railway.app/reference/config-as-code
# ─────────────────────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "java -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom -jar app.jar"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/v3/api-docs"
healthcheckTimeout = 60
