# ── Spring Boot Test Properties — In-Memory H2 Database ────────────────────────
spring.datasource.url=jdbc:h2:mem:securebank;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable schema initialization for H2 during tests
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Hibernate properties for H2
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Keep tests fast and stateless
spring.main.banner-mode=off
logging.level.root=WARN
logging.level.com.securebank=INFO
