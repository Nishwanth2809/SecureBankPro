# ── Supabase PostgreSQL — Session Pooler (ap-southeast-2) ───────────────────
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.pdyxkuipjjyewqeupwkq
spring.datasource.password=nishwantH@28
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Schema Initialization ────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ── Spring Data JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Force Hibernate to quote all identifiers so camelCase column names are
# preserved exactly as defined (matches the quoted "userId", "fullName" etc.
# in schema.sql)
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ── Connection Pool (HikariCP) ───────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
# Swagger UI: http://localhost:8080/swagger-ui.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=false
