# ── SecureBankPro — PRODUCTION Profile ───────────────────────────────────────
# Activated by: SPRING_PROFILES_ACTIVE=prod
#
# All sensitive values are read from environment variables.
# Set these in Railway / Render / Docker Compose env_file.
# NEVER hard-code secrets in this file.
# ─────────────────────────────────────────────────────────────────────────────

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Schema ────────────────────────────────────────────────────────────────────
# Tables are already created on Supabase — skip re-running schema.sql on prod
spring.sql.init.mode=never

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ── Connection Pool ───────────────────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Logging (production — less verbose) ──────────────────────────────────────
logging.level.root=WARN
logging.level.com.securebank=INFO
logging.level.org.springframework.security=WARN

# ── Swagger UI (keep enabled so deployed API can be explored) ─────────────────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
